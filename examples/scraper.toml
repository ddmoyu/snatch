# Snatch 爬取规则示例
# 复制为 scraper.toml 放在 exe 同目录即可生效

# --- 图片模式 ---
[[rules]]
name = "草榴图片"
domain = "t66y.com"
path_contains = "/16/"
container = ".tpc_content"
selectors = [
    { expression = "img", attribute = "data-src" },
    { expression = "img", attribute = "ess-data" },
    { expression = "img", attribute = "src" },
]

# --- 文本模式 + 翻页 ---
[[rules]]
name = "草榴小说"
domain = "t66y.com"
path_contains = "/20/"
mode = "text"
content_selector = ".tpc_content"

[rules.pagination]
type = "next_link"
next_selector = "a[href*='page=']"
max_pages = 20

# --- 文本模式 + 繁转简 + 水印过滤 ---
[[rules]]
name = "xx-book小说"
domain = "xx-book.com"
mode = "text"
content_selector = ".entry-content"
strip = ["book18.org"]
convert = "simplify"

# --- 文本模式 + 路径翻页 ---
[[rules]]
name = "sosing小说"
domain = "sosing.com"
mode = "text"
content_selector = ".entry-content"
convert = "simplify"

[rules.pagination]
type = "path"
start = 1
end = 10
