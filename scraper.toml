# --- 图片模式：草榴图片区 (/16/) ---
[[rules]]
name = "草榴图片"
domain = "t66y.com"
path_contains = "/16/"
container = ".tpc_content"
selectors = [
    { expression = "img", attribute = "data-src" },
    { expression = "img", attribute = "ess-data" },
    { expression = "img", attribute = "src" },
]

# --- 文本模式：草榴小说区 (/20/) ---
[[rules]]
name = "草榴小说"
domain = "t66y.com"
path_contains = "/20/"
mode = "text"
content_selector = ".tpc_content"

[rules.pagination]
type = "next_link"
next_selector = "a[href*='page=']"
max_pages = 20

# --- 文本模式：Blog小说 ---
[[rules]]
name = "Blog小说"
domain = "blog.xbookcn.net"
mode = "text"
content_selector = ".post-body"

# --- 文本模式：xx-book ---
[[rules]]
name = "xx-book小说"
domain = "xx-book.com"
mode = "text"
content_selector = ".entry-content"
strip = ["book18.org"]
convert = "simplify"

# --- 文本模式：sosing ---
[[rules]]
name = "sosing小说"
domain = "sosing.com"
mode = "text"
content_selector = ".entry-content"
convert = "simplify"

[rules.pagination]
type = "path"
start = 1
end = 10

# --- 图片模式：Photos18 ---
[[rules]]
name = "Photos18"
domain = "photos18.com"
container = "#content"
selectors = [
    { expression = "img", attribute = "src" },
]
